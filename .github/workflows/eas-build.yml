name: EAS Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install EAS CLI and Expo deps
        run: |
          npm install -g eas-cli
          npm install

      - name: Configure EAS
        run: |
          cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 5.0.0"
            },
            "build": {
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }
          EOF

      - name: Login to Expo
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        continue-on-error: true
        run: |
          echo "=== Testing Expo Token ==="
          TEST_RESULT=$(curl -s -w "%{http_code}" -o /tmp/response.json -H "Authorization: Bearer $EXPO_TOKEN" https://exp.host/--/api/v2/users/me)
          echo "HTTP Status: $TEST_RESULT"
          cat /tmp/response.json | head -50
          echo ""
          echo "=== Logging in to EAS ==="
          eas login --token "$EXPO_TOKEN" 2>&1 || { echo "Login failed with eas login"; }
          eas whoami 2>&1 || echo "whoami failed"

      - name: Build Android APK
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "=== Starting EAS Build ==="
          eas build --platform android --profile preview --non-interactive 2>&1 | tee /tmp/eas.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== EAS Build Exit Code: $EXIT_CODE ==="
          tail -100 /tmp/eas.log
          
          if [ $EXIT_CODE -eq 0 ]; then
            echo "=== Build started successfully ==="
            eas build:list --limit 1
          fi
          exit $EXIT_CODE

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-eas
          name: TİT Akrep İndirici v10.9.0 APK (EAS)
          body: "EAS Build ile oluşturuldu. APK'yı https://expo.dev/accounts/ozqan1/projects adresinden indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
