name: EAS Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Configure EAS
        run: |
          cat > eas.json << 'EOF'
          {
            "cli": {
              "version": ">= 5.0.0"
            },
            "build": {
              "preview": {
                "distribution": "internal",
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }
          EOF

      - name: Login to Expo
        run: eas login --token ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: |
          echo "=== Starting EAS Build ==="
          eas build --platform android --profile preview --non-interactive 2>&1 | tee /tmp/eas.log
          EXIT_CODE=$?
          echo ""
          echo "=== EAS Build Exit Code: $EXIT_CODE ==="
          tail -100 /tmp/eas.log
          exit $EXIT_CODE

      - name: Get Build Info
        run: |
          echo "=== Getting build information ==="
          eas build:list --limit 1
          echo ""
          echo "=== If build succeeded, download with: ==="
          echo "eas build:download --latest --platform android"

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-eas
          name: TİT Akrep İndirici v10.9.0 APK (EAS)
          body: "EAS Build ile oluşturuldu. APK'yı https://expo.dev/accounts/ozqan1/projects adresinden indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
