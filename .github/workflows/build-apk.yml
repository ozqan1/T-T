name: Build Android APK (RN CLI)

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      JAVA_HOME: /opt/java/openjdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          npm install

      - name: Generate Android native project
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          
          echo "=== Node version: $(node --version) ==="
          echo "=== Java version: $(java -version 2>&1 | head -1) ==="
          echo "=== Android SDK: $ANDROID_HOME ==="
          echo ""
          
          # Run expo prebuild
          npx expo prebuild --platform android --no-install --clean 2>&1 | tee /tmp/prebuild.log
          EXIT_CODE=${PIPESTATUS[0]}
          
          echo ""
          echo "=== Prebuild exit code: $EXIT_CODE ==="
          tail -50 /tmp/prebuild.log
          
          # Verify android folder
          echo ""
          echo "=== Checking android folder ==="
          ls -la android/ 2>/dev/null || { echo "ERROR: No android folder!"; exit 1; }
          ls -la android/gradlew 2>/dev/null || { echo "ERROR: No gradlew!"; exit 1; }
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== PREBUILD FAILED ==="
            exit 1
          fi
          echo "=== Prebuild SUCCEEDED ==="

      - name: Create JS bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res 2>&1 | tee /tmp/bundle.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Bundle exit code: $EXIT_CODE ==="
          tail -30 /tmp/bundle.log
          
          ls -la android/app/src/main/assets/
          [ -f android/app/src/main/assets/index.android.bundle ] && echo "Bundle created!" || echo "Bundle NOT found!"

      - name: Build Debug APK
        working-directory: android
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$PATH
          
          chmod +x gradlew
          
          echo "=== Listing gradle tasks ==="
          ./gradlew tasks --no-daemon 2>&1 | head -50
          
          echo ""
          echo "=== Building Debug APK ==="
          ./gradlew assembleDebug --no-daemon --warning-mode all --stacktrace 2>&1 | tee /tmp/gradle.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== Gradle exit code: $EXIT_CODE ==="
          echo "=== Last 150 lines ==="
          tail -150 /tmp/gradle.log
          
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== GRADLE BUILD FAILED ==="
            exit 1
          fi
          
          echo "=== Checking outputs ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"

      - name: Find APK
        run: |
          mkdir -p dist
          echo "=== Searching for APK ==="
          find android -name "*.apk" -type f 2>/dev/null
          
          APK_PATH=""
          for path in \
            "android/app/build/outputs/apk/debug/app-debug.apk" \
            "android/app/build/outputs/apk/debug/*.apk" \
            "android/app/build/outputs/**/*.apk"; do
            if [ -f "$path" ]; then
              APK_PATH="$path"
              break
            fi
          done
          
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            echo "Found: $APK_PATH"
            cp "$APK_PATH" dist/AkrepIndirici-v10.9.0.apk
            ls -la dist/
          else
            echo "=== Listing build outputs ==="
            find android/app/build/outputs -type f 2>/dev/null | head -50
            echo "=== No APK found! ==="
            exit 1
          fi
          echo "=== APK found and copied! ==="

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-apk
          name: TİT Akrep İndirici v10.9.0 APK
          files: dist/AkrepIndirici-v10.9.0.apk
          body: "Telefonunuza kurmak için APK'yı indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
