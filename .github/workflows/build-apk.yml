name: Build Android APK

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Debug Gradle files
        run: |
          echo "=== android/ ==="
          ls -la android/
          echo ""
          echo "=== gradle.properties ==="
          cat android/gradle.properties 2>/dev/null || echo "Not found"

      - name: Build APK with expo run:android
        run: |
          mkdir -p dist
          # Build release APK using expo run:android
          npx expo run:android --variant release --no-install 2>&1 | tee /tmp/expo-build.log
          echo "=== Build output ==="
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null || echo "No release dir"

      - name: Find and copy APK
        run: |
          mkdir -p dist
          # Check release APK
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "dist/AkrepIndirici-v10.9.0.apk"
            echo "Found release APK"
          # Check debug APK
          elif [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk "dist/AkrepIndirici-v10.9.0.apk"
            echo "Found debug APK"
          else
            echo "=== Checking all APK files ==="
            find android -name "*.apk" -type f 2>/dev/null
            echo "=== Expo build log ==="
            cat /tmp/expo-build.log
            exit 1
          fi
          ls -la dist/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Publish downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Akrep İndirici APK (build ${{ github.run_number }})
          body: |
            TİT 🦂 — Akrep İndirici otomatik derlenmiş APK.

            Telefonunuza kurmak için APK dosyasını indirip açın.
            (Ayarlar > Bilinmeyen kaynaklara izin vermeniz gerekebilir.)
          prerelease: true
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
