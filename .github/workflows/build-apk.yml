name: Build Android APK

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon -x lint --info 2>&1 | tail -100
          ls -la app/build/outputs/apk/ 2>/dev/null || echo "No APK outputs found"

      - name: Rename APK
        run: |
          mkdir -p dist
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk "dist/AkrepIndirici-v10.9.0.apk"
          elif [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk "dist/AkrepIndirici-v10.9.0-debug.apk"
          fi

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/
          if-no-files-found: error

      - name: Publish downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Akrep İndirici APK (build ${{ github.run_number }})
          body: |
            TİT 🦂 — Akrep İndirici otomatik derlenmiş APK.

            Telefonunuza kurmak için APK dosyasını indirip açın.
            (Ayarlar > Bilinmeyen kaynaklara izin vermeniz gerekebilir.)
          prerelease: true
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
