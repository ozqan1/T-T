name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate Android project
        run: npx expo prebuild --platform android --no-install

      - name: Create JS bundle for Android
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res 2>&1 || echo "Bundle failed, trying alternative..."

      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon -x lint 2>&1 | tail -50

      - name: Find and copy APK
        run: |
          mkdir -p dist
          echo "=== Looking for APK ==="
          find android -name "*.apk" -type f 2>/dev/null || echo "No APK found"
          
          # Try to find APK
          APK_PATH=""
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          elif [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          else
            # Search anywhere
            FOUND=$(find android -name "*.apk" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              APK_PATH="$FOUND"
            fi
          fi
          
          if [ -n "$APK_PATH" ] && [ -f "$APK_PATH" ]; then
            echo "Found APK: $APK_PATH"
            cp "$APK_PATH" dist/AkrepIndirici-v10.9.0.apk
            ls -la dist/
          else
            echo "ERROR: No APK found!"
            find android -type f 2>/dev/null | head -20
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-apk
          name: TİT Akrep İndirici v10.9.0 APK
          files: dist/AkrepIndirici-v10.9.0.apk
          body: "Telefonunuza kurmak için APK'yı indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
