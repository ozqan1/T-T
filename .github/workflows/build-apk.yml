name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      JAVA_HOME: /opt/java/openjdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          npm install

      - name: Generate Android native project
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          echo "=== Environment ==="
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "Node: $(node --version)"
          echo ""
          echo "=== Running expo prebuild ==="
          npx expo prebuild --platform android --no-install --clean 2>&1
          EXIT_CODE=$?
          echo ""
          echo "=== Prebuild exit code: $EXIT_CODE ==="
          echo ""
          echo "=== Checking android folder ==="
          ls -la android/ 2>/dev/null || echo "ERROR: No android folder!"
          ls -la android/gradlew 2>/dev/null || echo "ERROR: No gradlew!"
          ls -la android/gradle/ 2>/dev/null || echo "ERROR: No gradle folder!"
          echo ""
          if [ $EXIT_CODE -ne 0 ] || [ ! -f android/gradlew ]; then
            echo "=== PREBUILD FAILED ==="
            exit 1
          fi
          echo "=== Prebuild SUCCEEDED ==="

      - name: Create JS bundle
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res 2>&1 | tee /tmp/bundle.log
          EXIT_CODE=$?
          echo "=== Bundle exit code: $EXIT_CODE ==="
          tail -30 /tmp/bundle.log
          ls -la android/app/src/main/assets/

      - name: Build with Gradle
        working-directory: android
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$PATH
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log
          EXIT_CODE=$?
          echo "=== Gradle exit code: $EXIT_CODE ==="
          tail -100 /tmp/gradle.log
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== GRADLE BUILD FAILED ==="
            exit 1
          fi

      - name: Find and copy APK
        run: |
          mkdir -p dist
          find android -name "*.apk" -type f
          if [ -f android/app/build/outputs/apk/debug/app-debug.apk ]; then
            cp android/app/build/outputs/apk/debug/app-debug.apk dist/AkrepIndirici-v10.9.0.apk
          elif [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk dist/AkrepIndirici-v10.9.0.apk
          else
            echo "=== No APK found! ==="
            exit 1
          fi
          ls -la dist/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-apk
          name: TİT Akrep İndirici v10.9.0 APK
          files: dist/AkrepIndirici-v10.9.0.apk
          body: "Telefonunuza kurmak için APK'yı indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
