name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      JAVA_HOME: /opt/java/openjdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate Android project
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH

          npx expo prebuild --platform android --no-install --clean 2>&1 | tee /tmp/prebuild.log
          EXIT_CODE=${PIPESTATUS[0]}
          tail -30 /tmp/prebuild.log
          
          [ -f android/gradlew ] && echo "✅ Prebuild OK" || { echo "❌ Prebuild FAILED"; exit 1; }

      - name: Create JS Bundle
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$PATH
          
          mkdir -p android/app/src/main/assets
          
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res 2>&1 | tee /tmp/bundle.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Bundle exit code: $EXIT_CODE ==="
          tail -20 /tmp/bundle.log
          
          [ -f android/app/src/main/assets/index.android.bundle ] && echo "✅ Bundle created!" || { echo "❌ Bundle failed!"; exit 1; }

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$PATH

          cd android
          chmod +x gradlew

          ./gradlew assembleDebug --no-daemon 2>&1 | tee /tmp/gradle.log
          EXIT_CODE=${PIPESTATUS[0]}

          echo "=== Build result: $EXIT_CODE ==="
          tail -50 /tmp/gradle.log

      - name: Find APK
        run: |
          mkdir -p dist

          echo "=== Searching for APKs ==="
          find android -name "*.apk" -type f 2>/dev/null

          APK=$(find android -name "*.apk" -type f | head -1)
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            cp "$APK" dist/AkrepIndirici-v10.9.0.apk
            ls -la dist/
            echo "✅ APK ready: $APK"
          else
            echo "❌ No APK found!"
            find android/app/build -type f 2>/dev/null | head -30
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-apk
          name: TİT Akrep İndirici v10.9.0 APK
          files: dist/AkrepIndirici-v10.9.0.apk
          body: "Telefonunuza kurmak için APK'yı indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
