name: Build Android APK

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build installable APK
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --no-install

      - name: Debug Gradle files
        run: |
          echo "=== android/ ==="
          ls -la android/
          echo ""
          echo "=== gradle.properties ==="
          cat android/gradle.properties 2>/dev/null || echo "Not found"

      - name: Build APK with EAS remote
        env:
          EAS_EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          mkdir -p dist
          npm install -g eas-cli
          eas build --platform android --profile preview --non-interactive 2>&1 | tee /tmp/eas-build.log
          echo "=== EAS build complete ==="
          
      - name: Download EAS build artifact
        if: success()
        env:
          EAS_EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          npm install -g eas-cli
          # Get build info and download
          eas build:list --platform android --limit 1 --status finished 2>&1 | tee /tmp/eas-list.log
          BUILD_ID=$(grep -oP '(?<=Build ID: )\d+' /tmp/eas-list.log | head -1)
          if [ -n "$BUILD_ID" ]; then
            echo "Downloading build $BUILD_ID"
            eas build:download --id "$BUILD_ID" 2>&1 || echo "Download skipped"
          fi
          ls -la *.apk 2>/dev/null && cp *.apk dist/AkrepIndirici-v10.9.0.apk || echo "No APK found"

      - name: Find APK in dist
        run: |
          mkdir -p dist
          if [ -f *.apk ] 2>/dev/null; then
            cp *.apk dist/AkrepIndirici-v10.9.0.apk 2>/dev/null || true
          fi
          ls -la dist/ || echo "No dist"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Publish downloadable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Akrep İndirici APK (build ${{ github.run_number }})
          body: |
            TİT 🦂 — Akrep İndirici otomatik derlenmiş APK.

            Telefonunuza kurmak için APK dosyasını indirip açın.
            (Ayarlar > Bilinmeyen kaynaklara izin vermeniz gerekebilir.)
          prerelease: true
          files: dist/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
