name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /opt/android-sdk
      ANDROID_SDK_ROOT: /opt/android-sdk
      JAVA_HOME: /opt/java/openjdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Prebuild Android
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$PATH

          npx expo prebuild --platform android --no-install --clean 2>&1

      - name: Build Debug APK
        run: |
          export ANDROID_HOME=/opt/android-sdk
          export ANDROID_SDK_ROOT=/opt/android-sdk
          export JAVA_HOME=/opt/java/openjdk
          export PATH=$JAVA_HOME/bin:$PATH

          cd android
          chmod +x gradlew

          # Build with verbose output
          ./gradlew assembleDebug --no-daemon --info 2>&1 | tee /tmp/gradle.log
          
          EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Gradle Exit Code: $EXIT_CODE ==="
          
          # List all files created
          echo "=== All build outputs ==="
          find . -type f -name "*.apk" 2>/dev/null
          find . -type d -name "outputs" 2>/dev/null
          ls -laR app/build/outputs/ 2>/dev/null || echo "No outputs dir"

      - name: Find APK
        run: |
          mkdir -p dist
          
          echo "=== Searching ALL directories for APK ==="
          find / -name "*.apk" -type f 2>/dev/null | head -20 || echo "No APK found"
          
          # Search in common locations
          echo "=== Check common locations ==="
          ls -la android/app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK dir"
          ls -la android/app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
          ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
          
          # Find first APK
          APK=$(find android -name "*.apk" -type f 2>/dev/null | head -1)
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            echo "Found: $APK"
            cp "$APK" dist/app.apk
            ls -la dist/
          else
            echo "=== DEBUG: List android/app/build ==="
            find android/app/build -type f 2>/dev/null | head -50
            echo "=== No APK found! ==="
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/app.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-apk
          name: TİT Akrep İndirici v10.9.0 APK
          files: dist/app.apk
          body: "Telefonunuza kurmak için APK'yı indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
