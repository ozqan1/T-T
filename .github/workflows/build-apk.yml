name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build with expo run:android
        run: |
          npx expo run:android --variant release --no-install --no-bundler 2>&1 | tee /tmp/expo-build.log
          echo "=== Build finished ==="
          cat /tmp/expo-build.log | tail -100

      - name: Find APK
        run: |
          mkdir -p dist
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null | head -10
          
          # Copy APK
          APK=$(find android -name "*.apk" -type f 2>/dev/null | grep -v instant | head -1)
          if [ -n "$APK" ] && [ -f "$APK" ]; then
            cp "$APK" "dist/AkrepIndirici-v10.9.0.apk"
            ls -la dist/
          else
            echo "=== Checking android/app/build/outputs ==="
            ls -la android/app/build/outputs/ 2>/dev/null || echo "No outputs dir"
            echo "=== Log tail ==="
            tail -80 /tmp/expo-build.log
            exit 1
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-apk
          name: TİT Akrep İndirici v10.9.0 APK
          files: dist/AkrepIndirici-v10.9.0.apk
          body: "Telefonunuza kurmak için APK'yı indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
