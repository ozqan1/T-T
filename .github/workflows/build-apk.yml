name: Build Android APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate Android native project
        run: |
          npx expo prebuild --platform android --no-install 2>&1 | tee /tmp/prebuild.log
          echo "=== Prebuild completed ==="
          cat /tmp/prebuild.log | tail -30

      - name: Create JS bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res 2>&1 | tee /tmp/bundle.log
          echo "=== Bundle result ==="
          tail -20 /tmp/bundle.log
          ls -la android/app/src/main/assets/ 2>/dev/null || echo "Assets dir empty"

      - name: Build with Gradle
        working-directory: android
        env:
          JAVA_HOME: /opt/java/openjdk
          ANDROID_HOME: /opt/android-sdk
        run: |
          ./gradlew assembleRelease --no-daemon --warning-mode all 2>&1 | tee /tmp/gradle.log
          echo "=== Gradle build result ==="
          tail -80 /tmp/gradle.log

      - name: Find and copy APK
        run: |
          mkdir -p dist
          echo "=== Checking outputs ==="
          ls -la android/app/build/outputs/apk/release/ 2>/dev/null && \
            cp android/app/build/outputs/apk/release/app-release.apk dist/AkrepIndirici-v10.9.0.apk || \
          (echo "No release APK, checking debug..." && \
           ls -la android/app/build/outputs/apk/debug/ 2>/dev/null && \
           cp android/app/build/outputs/apk/debug/app-debug.apk dist/AkrepIndirici-v10.9.0.apk) || \
          (echo "=== Last 100 lines of gradle log ===" && tail -100 /tmp/gradle.log && exit 1)
          echo "=== APK copied ==="
          ls -la dist/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AkrepIndirici-APK
          path: dist/AkrepIndirici-v10.9.0.apk
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v10.9.0-apk
          name: TİT Akrep İndirici v10.9.0 APK
          files: dist/AkrepIndirici-v10.9.0.apk
          body: "Telefonunuza kurmak için APK'yı indirin."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
